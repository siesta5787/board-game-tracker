name: Release

# Builds a static 64-bit Raspberry Pi binary (Pi 3/4/5/Zero 2 W) whenever a
# version tag is pushed, and attaches it as a GitHub Release. `install.sh` /
# `update.sh` download it automatically.
#
# 32-bit (armv7) support was dropped since no target hardware needs it; the
# old two-target matrix is still in git history if it's ever needed again.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches the tag
        # The app reports its own version via CARGO_PKG_VERSION (Cargo always
        # sets this — no custom env/file plumbing needed, unlike two earlier
        # attempts that both turned out not to reliably reach the compiler
        # inside cross's Docker build container). That means Cargo.toml has
        # to be bumped by hand alongside each tag; fail loudly here instead
        # of silently shipping a binary whose self-reported version is wrong.
        run: |
          set -euo pipefail
          CARGO_VERSION="v$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$CARGO_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) doesn't match tag (${{ github.ref_name }})" >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (${{ matrix.target }})
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/board_game_tracker dist/
          cp -r static dist/
          tar -czf board-game-tracker-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: board-game-tracker-${{ matrix.target }}
          path: board-game-tracker-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
