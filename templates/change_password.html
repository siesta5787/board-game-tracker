<!DOCTYPE html>
<html lang="en">
<head>
{% include "partials/head.html" %}
</head>
<body class="auth-page">
    <div class="card">
        <h1>Choose a new password</h1>
        <p class="subtitle">You're using a temporary password — set your own before continuing.</p>

        {% if let Some(e) = error %}
        <div class="error">{{ e }}</div>
        {% endif %}

        <form method="post" action="/auth/change-password">
            <label for="current_password">Current (temporary) password</label>
            <input type="password" id="current_password" name="current_password" autocomplete="current-password" required autofocus>

            <label for="new_password">New password</label>
            <input type="password" id="new_password" name="new_password" autocomplete="new-password" minlength="15" required>
            <p class="hint">At least 15 characters.</p>

            <label for="confirm_password">Confirm new password</label>
            <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="15" required>

            <button type="submit">Set password</button>
        </form>
    </div>
</body>
</html>
