<header class="app-header">
    <a href="/" class="brand">Board Game Tracker</a>
</header>

<nav class="bottom-nav">
    <a href="/" class="bottom-nav-item" data-match="^/$">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
        <span>Home</span>
    </a>
    <a href="/collection" class="bottom-nav-item" data-match="^/collection">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 011 1v17l-7-4-7 4V4a1 1 0 011-1z"/></svg>
        <span>Collection</span>
    </a>
    <a href="/plays" class="bottom-nav-item" data-match="^/plays">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1" fill="currentColor" stroke="none"/></svg>
        <span>Plays</span>
    </a>
    <a href="/stats" class="bottom-nav-item" data-match="^/stats">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="4" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="20" y1="20" x2="20" y2="14"/></svg>
        <span>Stats</span>
    </a>
    <a href="/games" class="bottom-nav-item" data-match="^/games">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Games</span>
    </a>
    <a href="/settings" class="bottom-nav-item" data-match="^/(settings|users|profile|admin|notifications|import|export)">
        <span class="bottom-nav-avatar-wrap">
            <img src="/users/{{ username }}/photo" alt="" class="bottom-nav-avatar" onerror="this.style.display='none'">
            <span class="bottom-nav-badge" id="notif-badge" hidden></span>
        </span>
        <span>Settings</span>
    </a>
</nav>

<script>
(function () {
    var path = location.pathname;
    document.querySelectorAll(".bottom-nav-item").forEach(function (el) {
        var match = el.getAttribute("data-match");
        if (match && new RegExp(match).test(path)) {
            el.classList.add("active");
        }
    });
    fetch("/notifications/unread-count", { cache: "no-store" })
        .then(function (r) { return r.ok ? r.text() : "0"; })
        .then(function (text) {
            var count = parseInt(text, 10) || 0;
            var badge = document.getElementById("notif-badge");
            if (badge && count > 0) {
                badge.hidden = false;
            }
        })
        .catch(function () {});
})();
</script>
